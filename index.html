<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="イベントや授業で活躍する、モダンでスムーズな発表者選出（ルーレット）アプリ。">
    <title>プレミアム発表者選出アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap');

        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-gradient: linear-gradient(to right, #48bb78, #38a169);
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background: var(--primary-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 500px;
            padding: 2.5rem;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .presenter-display {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: #2d3748;
            margin: 2rem 0;
            border: 4px dashed #cbd5e0;
            border-radius: 1.5rem;
            position: relative;
            overflow: hidden;
            background: #f7fafc;
            transition: border-color 0.3s ease;
        }

        .presenter-display.active {
            border-color: #667eea;
            background: #ebf4ff;
        }

        .slot-animation {
            animation: slot-scroll 0.1s linear infinite;
        }

        @keyframes slot-scroll {
            0% { transform: translateY(-10px); opacity: 0.7; }
            50% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(10px); opacity: 0.7; }
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: white;
            padding: 1.25rem 2rem;
            border-radius: 9999px;
            font-size: 1.25rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(56, 161, 105, 0.3);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: none;
            width: 100%;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(56, 161, 105, 0.4);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            background: #cbd5e0;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .list-item {
            animation: slideIn 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            opacity: 0;
            transform: translateX(-20px);
        }

        @keyframes slideIn {
            to { opacity: 1; transform: translateX(0); }
        }

        .winner-text {
            color: #5a67d8;
            transform: scale(1.1);
            transition: all 0.5s ease;
        }
    </style>
</head>
<body>

    <main class="card">
        <header>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">発表者選出</h1>
            <p id="counter" class="text-gray-500 mb-6 font-medium" aria-live="polite">残り -- 名</p>
        </header>

        <section id="selection-area">
            <div id="presenter-box" class="presenter-display" role="status" aria-live="polite">
                <span id="name-label">???</span>
            </div>

            <button id="draw-btn" class="btn-primary">選出を開始する！</button>
        </section>

        <section id="result-list-section" class="mt-8 text-left border-t pt-6 hidden">
            <h2 class="text-lg font-bold text-gray-700 mb-3">決定した順序:</h2>
            <ul id="history" class="space-y-3">
                <!-- 履歴がここに追加される -->
            </ul>
        </section>
        
        <button id="reset-btn" class="mt-8 text-sm text-blue-600 hover:text-blue-800 font-bold transition-colors hidden">リセットして最初からやり直す</button>
    </main>

    <script>
        /**
         * アプリの設定値
         */
        const CONFIG = {
            CANDIDATE_COUNT: 5,
            SPIN_DURATION: 1200, // ms
            LAST_NAMES: ["佐藤", "鈴木", "高橋", "田中", "伊藤", "渡辺", "山本", "中村", "小林", "加藤", "吉田", "山田", "佐々木", "山口", "松本", "井上", "木村", "林", "斎藤", "清水"]
        };

        let candidates = [];
        let selectedOrder = [];
        let isSpinning = false;
        let lastFrameTime = 0;
        const frameInterval = 80; // スロットの名前更新間隔 (ms)

        // DOM要素
        const elements = {
            drawBtn: document.getElementById('draw-btn'),
            resetBtn: document.getElementById('reset-btn'),
            presenterBox: document.getElementById('presenter-box'),
            nameLabel: document.getElementById('name-label'),
            counterLabel: document.getElementById('counter'),
            resultListSection: document.getElementById('result-list-section'),
            historyList: document.getElementById('history')
        };

        /**
         * 初期化：候補者を生成
         */
        function init() {
            const shuffled = [...CONFIG.LAST_NAMES].sort(() => 0.5 - Math.random());
            candidates = shuffled.slice(0, CONFIG.CANDIDATE_COUNT);
            updateCounter();
        }

        function updateCounter() {
            elements.counterLabel.innerText = `残り ${candidates.length} 名`;
        }

        /**
         * 選出手続きの開始
         */
        function startDrawing() {
            if (isSpinning || candidates.length === 0) return;

            isSpinning = true;
            elements.drawBtn.disabled = true;
            elements.presenterBox.classList.add('active');
            elements.nameLabel.classList.add('slot-animation');
            
            const startTime = performance.now();
            lastFrameTime = startTime;

            // requestAnimationFrameを使用したスロット演出
            function animateSlot(currentTime) {
                const elapsed = currentTime - startTime;

                if (elapsed < CONFIG.SPIN_DURATION) {
                    // 一定間隔で名前をランダムに表示
                    if (currentTime - lastFrameTime > frameInterval) {
                        const tempName = CONFIG.LAST_NAMES[Math.floor(Math.random() * CONFIG.LAST_NAMES.length)];
                        elements.nameLabel.innerText = tempName;
                        lastFrameTime = currentTime;
                    }
                    requestAnimationFrame(animateSlot);
                } else {
                    finalizeSelection();
                }
            }

            requestAnimationFrame(animateSlot);
        }

        /**
         * 当選者の確定とUI更新
         */
        function finalizeSelection() {
            const randomIndex = Math.floor(Math.random() * candidates.length);
            const winner = candidates.splice(randomIndex, 1)[0];
            selectedOrder.push(winner);

            // 演出の停止
            elements.nameLabel.classList.remove('slot-animation');
            elements.nameLabel.innerText = winner;
            elements.nameLabel.classList.add('winner-text');
            
            updateCounter();
            
            // 履歴に追加
            elements.resultListSection.classList.remove('hidden');
            addHistoryEntry(winner, selectedOrder.length);

            // 紙吹雪エフェクト
            createConfettiEffect();

            setTimeout(() => {
                elements.nameLabel.classList.remove('winner-text');
                elements.presenterBox.classList.remove('active');
                isSpinning = false;
                
                if (candidates.length > 0) {
                    elements.drawBtn.disabled = false;
                } else {
                    elements.drawBtn.innerText = "全員の選出が完了しました！";
                    elements.resetBtn.classList.remove('hidden');
                }
            }, 800);
        }

        function addHistoryEntry(name, index) {
            const li = document.createElement('li');
            li.className = "list-item flex items-center bg-white p-3 rounded-xl border border-gray-100 shadow-sm";
            li.innerHTML = `
                <span class="flex items-center justify-center w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 font-bold mr-4 text-sm">${index}</span>
                <span class="text-gray-800 font-medium">${name} さん</span>
            `;
            elements.historyList.appendChild(li);
        }

        function createConfettiEffect() {
            const fragment = document.createDocumentFragment();
            const count = 40;
            
            for (let i = 0; i < count; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '100%';
                confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 80%, 60%)`;
                
                fragment.appendChild(confetti);

                const animation = confetti.animate([
                    { transform: 'translate3d(0,0,0) rotate(0deg)', opacity: 1 },
                    { transform: `translate3d(${(Math.random() - 0.5) * 300}px, -${Math.random() * 500 + 300}px, 0) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                ], {
                    duration: Math.random() * 1500 + 1000,
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                });

                animation.onfinish = () => confetti.remove();
            }
            document.body.appendChild(fragment);
        }

        function resetApp() {
            init();
            selectedOrder = [];
            isSpinning = false;
            elements.nameLabel.innerText = "???";
            elements.drawBtn.disabled = false;
            elements.drawBtn.innerText = "選出を開始する！";
            elements.historyList.innerHTML = "";
            elements.resultListSection.classList.add('hidden');
            elements.resetBtn.classList.add('hidden');
            elements.presenterBox.classList.remove('active');
        }

        // イベントリスナー
        elements.drawBtn.addEventListener('click', startDrawing);
        elements.resetBtn.addEventListener('click', resetApp);

        // 初期実行
        init();
    </script>
</body>

</body>
</html>
